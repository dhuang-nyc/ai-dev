services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aidev}
      POSTGRES_USER: ${POSTGRES_USER:-aidev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aidev}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  django:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py create_admin &&
             python manage.py collectstatic --no-input &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_files:/app/src/staticfiles
      - workspaces:/workspaces
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # API, admin, and static routes — more specific rules take priority over the web catch-all
      - "traefik.http.routers.capyai-django.rule=Host(`capyai.daisyhuang.dev`) && (PathPrefix(`/api/`) || PathPrefix(`/admin/`) || PathPrefix(`/static/`))"
      - "traefik.http.routers.capyai-django.entrypoints=websecure"
      - "traefik.http.routers.capyai-django.tls.certresolver=cloudflare"
      - "traefik.http.services.capyai-django.loadbalancer.server.port=8000"

  celery:
    build: .
    command: celery -A core worker -l info -c 4
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - workspaces:/workspaces
    networks:
      - internal

  flower:
    build: .
    command: celery -A core flower --port=5555 --url-prefix=flower
    env_file: .env.prod
    depends_on:
      - redis
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.capyai-flower.rule=Host(`capyai.daisyhuang.dev`) && PathPrefix(`/flower`)"
      - "traefik.http.routers.capyai-flower.entrypoints=websecure"
      - "traefik.http.routers.capyai-flower.tls.certresolver=cloudflare"
      - "traefik.http.services.capyai-flower.loadbalancer.server.port=5555"
      - "traefik.http.routers.capyai-flower.middlewares=capyai-flower-auth"
      # Generate with: echo $(htpasswd -nB admin) | sed -e s/\\$/\\$\\$/g
      - "traefik.http.middlewares.capyai-flower-auth.basicauth.users=${FLOWER_AUTH_USERS}"

  web:
    image: node:20-alpine
    working_dir: /app
    # vite preview serves the production build; build artifacts stay in the container
    command: sh -c "npm ci && npm run build && npm run preview -- --host 0.0.0.0 --port 4173"
    environment:
      - VITE_API_URL=https://capyai.daisyhuang.dev
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - django
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # Catch-all for the domain — lower priority than the django router (Traefik auto-ranks by rule specificity)
      - "traefik.http.routers.capyai-web.rule=Host(`capyai.daisyhuang.dev`)"
      - "traefik.http.routers.capyai-web.entrypoints=websecure"
      - "traefik.http.routers.capyai-web.tls.certresolver=cloudflare"
      - "traefik.http.services.capyai-web.loadbalancer.server.port=4173"

networks:
  internal:
  proxy:
    external: true

volumes:
  postgres_data:
  static_files:
  workspaces:
